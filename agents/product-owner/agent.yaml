slug: product-owner
name: "Chandler Bing"
role: product-owner
description: "Coordina la discusion entre agentes, toma decisiones de producto, prioriza features, y define cuando un issue esta listo para implementacion."
personality: friends-chandler
promptFile: agents/product-owner/prompt.md
skills:
  - source: local/forge-po-orchestration
    priority: critical
  - source: local/forge-deliverables-format
    priority: high
tools:
  - search_memory
  - read_repo_file
  - escalate_to_orchestration
  - create_mission
  - update_mission_status
  - link_issue_to_mission
  - list_missions
wake_triggers:
  - type: daily_standup
    cron: "0 9 * * 1-5"
    task: daily_standup
    description: "Post daily standup Mon-Fri at 9am UTC: what is in progress, any blockers, plans for today"
  - type: inbox
    cron: "*/30 * * * *"
    task: check_inbox
    description: "Check inbox every 30 minutes and respond to pending DMs"
    minMessages: 1
